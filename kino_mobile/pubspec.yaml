name: kino_mobile
description: "Kino — AI-Powered Movie Discovery"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.6.0
  google_fonts: ^8.0.2
  youtube_player_flutter: ^9.0.1
  url_launcher: ^6.3.1
  flutter_card_swiper: ^7.0.0
  shared_preferences: ^2.2.2
  firebase_core: ^3.15.2
  firebase_auth: ^5.6.3
  google_sign_in: ^6.3.0
  share_plus: ^11.0.0
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/kino_icon.png"
  adaptive_icon_background: "#0A0A0F"
  adaptive_icon_foreground: "assets/images/kino_icon.png"
